<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <!-- viewport-fit=cover so iPhone notch / safe-area inset
             utilities (env(safe-area-inset-*)) work; pages can opt
             into edge-to-edge layouts without losing tap targets
             under the home indicator. -->
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <!-- Explicit color-scheme so the browser doesn't apply a
             dark-mode form-control default that would clash with
             the cream PAPER design token. -->
        <meta name="color-scheme" content="light" />
        <!--
            ╔══════════════════════════════════════════════════════════════════
            ║  ROBOTS — staging mode
            ║  Preview / staging is set to noindex, nofollow so the in-progress
            ║  site does not get crawled by Google or other indexers. AT LAUNCH:
            ║    1. Delete both <meta name="robots"> + <meta name="googlebot">
            ║       lines below (or change content to "index, follow").
            ║    2. Replace public/robots.txt with the LAUNCH-MODE block already
            ║       commented inside that file.
            ║    3. Confirm public/sitemap.xml lists every live route + matches
            ║       production domain in <SITE_URL>.
            ╚══════════════════════════════════════════════════════════════════
        -->
        <meta name="robots" content="noindex, nofollow" />
        <meta name="googlebot" content="noindex, nofollow" />
        <meta name="theme-color" content="#0d2442" />
        <meta name="description" content="POWERS is a manufacturing operations management consulting firm. We build the execution discipline that drives sustained operations performance — on the floor, with the team, where the work actually happens." />

        <!-- Open Graph defaults (per-page values are upserted by <SEO /> at runtime) -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="POWERS" />
        <meta property="og:locale" content="en_US" />
        <meta property="og:title" content="POWERS — Manufacturing Operations Management Consulting" />
        <meta property="og:description" content="POWERS is a manufacturing operations management consulting firm. We build the execution discipline that drives sustained operations performance." />
        <meta property="og:url" content="https://thepowerscompany.com/" />
        <meta property="og:image" content="https://thepowerscompany.com/uploads/powers-banner-2026-v2-poster.jpg" />
        <meta property="og:image:alt" content="POWERS — Manufacturing Operations Management Consulting" />

        <!-- Twitter Card defaults -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:site" content="@thepowerscompany" />
        <meta name="twitter:title" content="POWERS — Manufacturing Operations Management Consulting" />
        <meta name="twitter:description" content="POWERS is a manufacturing operations management consulting firm. We build the execution discipline that drives sustained operations performance." />
        <meta name="twitter:image" content="https://thepowerscompany.com/uploads/powers-banner-2026-v2-poster.jpg" />

        <link rel="canonical" href="https://thepowerscompany.com/" />
        <!-- Preconnect: critical 3rd-party origins.
             - fonts.googleapis.com / fonts.gstatic.com  → Inter fallback face
             - use.typekit.net / p.typekit.net           → Adobe Proxima Nova kit
             - www.thepowerscompany.com                  → legacy WP image CDN
               (Insights cards + Mastery Series pillars all load thumbnails
               from /wp-content/uploads/* — preconnecting at <head> warms
               TCP/TLS so the first card image starts ~150ms earlier on
               cold loads). -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://use.typekit.net" />
        <link rel="preconnect" href="https://p.typekit.net" crossorigin />
        <link rel="preconnect" href="https://www.thepowerscompany.com" crossorigin />
        <!-- DNS-only fallback for older clients that skip preconnect -->
        <link rel="dns-prefetch" href="https://www.thepowerscompany.com" />
        <!-- Preload critical CSS stylesheets so the browser starts
             parsing font-face declarations before main script tags
             block the parser. Each <link rel="preload" as="style">
             is paired with the actual stylesheet link below so the
             style sheet activates as soon as it's downloaded. -->
        <link rel="preload" as="style" href="https://use.typekit.net/dhv8kja.css" />
        <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
        <!-- Inter as a comprehensive fallback for Proxima Nova; ALL body/display weights -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" media="all" />
        <!-- Adobe Fonts (Typekit) — Proxima Nova, per CLAUDE.md design tokens. media="all" is explicit so the stylesheet loads in BOTH screen and print contexts (Playwright PDF generation otherwise can miss the print-only path). -->
        <link rel="stylesheet" href="https://use.typekit.net/dhv8kja.css" media="all" />
        <!-- Tabler Icons — used by the case-study detail hero stat tiles (cs-hd-stat-icon, cs-result-icon, etc.) -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css" media="all" />

        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->

        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>POWERS — Manufacturing Operations Management Consulting</title>

                "contactType": "sales",
                "areaServed": "US",
                "availableLanguage": ["English"]

            {
              "@type": "WebSite",
              "@id": "https://thepowerscompany.com/#website",
              "url": "https://thepowerscompany.com/",
              "name": "POWERS",
              "publisher": { "@id": "https://thepowerscompany.com/#organization" },
              "inLanguage": "en-US"
            }
          ]
        }
        </script>
